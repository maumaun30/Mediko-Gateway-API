<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediko Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
</head>

<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Discount Applications</h1>
            <button onclick="loadSubmissions()"
                class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700">Refresh</button>
        </div>

        <div class="bg-white shadow rounded-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Applicant</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID Number</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Photos</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <div id="image-modal"
        class="fixed inset-0 z-50 hidden bg-black bg-opacity-95 flex flex-col items-center justify-center p-6">
        <button onclick="closeModal()"
            class="absolute top-5 right-8 text-white text-5xl hover:text-gray-300 transition">&times;</button>

        <div id="modal-container" class="flex flex-wrap justify-center gap-4 w-full max-w-7xl">
        </div>

        <div id="modal-caption" class="text-white mt-6 font-medium text-xl bg-gray-800 px-4 py-2 rounded"></div>
    </div>

    <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>
    <script>
        let dashboardToken = null;
        const GATEWAY_URL = 'https://mediko-gateway.quailshack.com';

        // Shopify App Bridge init
        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('apiKey') || 'dummy-key-for-testing'; // Replace with real Shopify app public key
        const app = window['app-bridge'].createApp({
            apiKey: apiKey,
            host: urlParams.get('host')
        });

        // Authenticate with gateway
        async function authenticateWithGateway() {
            try {
                const sessionToken = await window['app-bridge-utils'].getSessionToken(app);
                const shopOrigin = urlParams.get('shop');

                const res = await fetch(`${GATEWAY_URL}/api/auth/shopify`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({shopOrigin, sessionToken})
                });

                if (!res.ok) {
                    console.error('Auth failed:', await res.text());
                    throw new Error('Auth failed');
                }

                const data = await res.json();
                dashboardToken = data.token;
                console.log('✅ Auth token received');
            } catch (e) {
                console.error('Auth error:', e);
                throw e;
            }
        }

        async function loadSubmissions() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center">Loading...</td></tr>';

            try {
                if (!dashboardToken) {
                    await authenticateWithGateway();
                }
                const res = await fetch(`${GATEWAY_URL}/api/submissions?limit=50`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${dashboardToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Submissions response:', res.status, await res.text()); // DEBUG

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.error || `Server Error: ${res.status}`);
                }

                const json = await res.json();
                console.log('✅ Data loaded:', json.data?.length || 0, 'records');

                tbody.innerHTML = json.data.map(app => {
                    const photoArray = app.id_photo_path.split(',');
                    return `
                    <tr>
                        <td class="px-6 py-4">
                        <div class="text-sm font-medium text-gray-900">${app.full_name}</div>
                        <div class="text-xs text-gray-500">${app.email_address}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">${app.id_number}</td>
                        <td class="px-6 py-4 text-sm">
                        <div class="flex gap-2">
                            ${photoArray.map((path, i) => {
                        const fileName = path.split('/').pop();
                        const fullUrl = `${GATEWAY_URL}/view-uploads/${fileName}`;
                        return `
                                    <button onclick="openPreview('${fullUrl}', '${app.full_name}')" 
                                            class="bg-gray-100 hover:bg-blue-100 border border-gray-300 rounded px-2 py-1 text-xs flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                        View ${i + 1}
                                    </button>
                                `;
                    }).join('')}
                        </div>
                        </td>
                        <td class="px-6 py-4 text-sm">
                        <button onclick="approve(${app.id})" class="bg-green-100 text-green-700 px-3 py-1 rounded-full font-bold hover:bg-green-200 mr-2">Approve</button>
                        <button onclick="reject(${app.id})" class="bg-red-100 text-red-700 px-3 py-1 rounded-full font-bold hover:bg-red-200">Reject</button>
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error("Dashboard Fetch Error:", e);
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Error: ${e.message}</td></tr>`;
            }
        }

        // --- Modal Control Functions ---
        function openPreview(photoString, name) {
            const modal = document.getElementById('image-modal');
            const container = document.getElementById('modal-container');
            const caption = document.getElementById('modal-caption');

            // photoString is "uploads/id1.jpg,uploads/id2.jpg"
            const photos = photoString.split(',');
            container.innerHTML = '';

            photos.forEach(path => {
                const fileName = path.split('/').pop();
                const img = document.createElement('img');
                img.src = `${GATEWAY_URL}/view-uploads/${fileName}`;
                img.className = "max-h-[70vh] w-auto rounded shadow-xl border-2 border-white object-contain bg-gray-900";
                container.appendChild(img);
            });

            caption.innerText = `Reviewing IDs for: ${name}`;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        // Close modal on 'Esc' key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadSubmissions();
    </script>
</body>

</html>
